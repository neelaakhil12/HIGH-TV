    <text x="135" y="315" font-size="10" fill="#4b5563" class="body-text">హైదరాబాద్ పరిసరాల్లో</text>
    <text x="135" y="335" font-size="10" fill="#4b5563" class="body-text">నేడు ఉరుములతో కూడిన వాన</text>
